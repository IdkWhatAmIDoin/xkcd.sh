name: Redirect to Forgejo
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
jobs:
  redirect:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Comment and close
        uses: actions/github-script@v7
        with:
          script: |
            const msg = "This repository is a mirror of my own Forgejo repository. Find the repo here: [xkcd.sh](http://185.68.244.71:3002/dima/xkcd.sh)"

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: msg
            })

            if (context.payload.pull_request) {
              await github.rest.pulls.update({
                ...context.repo,
                pull_number: context.issue.number,
                state: "closed"
              })
            } else {
              await github.rest.issues.update({
                ...context.repo,
                issue_number: context.issue.number,
                state: "closed"
              })
            }
